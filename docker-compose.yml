version: "3.9"

services:
  db:
    image: postgres
    container_name: postgres
    env_file: .env
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    container_name: fastapi
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
  frontend:
    build:
      context: ./frontapp-react
    container_name: react
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontapp-react/src:/app/src